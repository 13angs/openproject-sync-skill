<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenProject Sync</title>
  </head>
  <body>
    <script>
      async function opRequest(api, headers, method, path, body) {
        const res = await fetch(api + path, {
          method,
          headers,
          body: body ? JSON.stringify(body) : undefined,
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.message || res.statusText);
        return json;
      }

      function formatWP(wp) {
        return {
          id:        wp.id,
          subject:   wp.subject,
          status:    wp._links?.status?.title,
          priority:  wp._links?.priority?.title,
          assignee:  wp._links?.assignee?.title || null,
          type:      wp._links?.type?.title,
          updatedAt: wp.updatedAt,
        };
      }

      window["ai_edge_gallery_get_result"] = async (data) => {
        try {
          const p = JSON.parse(data);
          if (!p.op_url)     return JSON.stringify({ error: "op_url is required." });
          if (!p.op_api_key) return JSON.stringify({ error: "op_api_key is required." });

          const api = p.op_url.replace(/\/$/, "") + "/api/v3";
          const headers = {
            Authorization: "Basic " + btoa("apikey:" + p.op_api_key),
            "Content-Type": "application/json",
            Accept: "application/json",
          };

          let result;

          if (p.action === "list") {
            if (!p.project_id) return JSON.stringify({ error: "project_id is required for list." });
            const json = await opRequest(api, headers, "GET",
              `/projects/${p.project_id}/work_packages?filters=[{"status":{"operator":"o","values":[]}}]&pageSize=50`);
            result = (json._embedded?.elements || []).map(formatWP);

          } else if (p.action === "list-query") {
            if (!p.query_id) return JSON.stringify({ error: "query_id is required for list-query." });
            const json = await opRequest(api, headers, "GET",
              `/work_packages?queryId=${p.query_id}&pageSize=50`);
            result = (json._embedded?.elements || []).map(formatWP);

          } else if (p.action === "get") {
            if (!p.wp_id) return JSON.stringify({ error: "wp_id is required for get." });
            const json = await opRequest(api, headers, "GET", `/work_packages/${p.wp_id}`);
            result = formatWP(json);

          } else if (p.action === "create") {
            if (!p.project_id) return JSON.stringify({ error: "project_id is required for create." });
            if (!p.subject)    return JSON.stringify({ error: "subject is required for create." });
            const body = {
              subject: p.subject,
              _links: {
                type:    { href: `${api}/types/${p.type_id || 1}` },
                project: { href: `${api}/projects/${p.project_id}` },
              },
            };
            const json = await opRequest(api, headers, "POST", "/work_packages", body);
            result = { created: true, id: json.id, subject: json.subject };

          } else if (p.action === "update") {
            if (!p.wp_id)     return JSON.stringify({ error: "wp_id is required for update." });
            if (!p.status_id) return JSON.stringify({ error: "status_id is required for update." });
            const current = await opRequest(api, headers, "GET", `/work_packages/${p.wp_id}`);
            const body = {
              lockVersion: current.lockVersion,
              _links: { status: { href: `${api}/statuses/${p.status_id}` } },
            };
            if (p.note) body.comment = { raw: p.note };
            const json = await opRequest(api, headers, "PATCH", `/work_packages/${p.wp_id}`, body);
            result = { updated: true, id: json.id, status: json._links?.status?.title };

          } else if (p.action === "priority") {
            if (!p.wp_id)       return JSON.stringify({ error: "wp_id is required for priority." });
            if (!p.priority_id) return JSON.stringify({ error: "priority_id is required for priority." });
            const current = await opRequest(api, headers, "GET", `/work_packages/${p.wp_id}`);
            const body = {
              lockVersion: current.lockVersion,
              _links: { priority: { href: `${api}/priorities/${p.priority_id}` } },
            };
            const json = await opRequest(api, headers, "PATCH", `/work_packages/${p.wp_id}`, body);
            result = { updated: true, id: json.id, priority: json._links?.priority?.title };

          } else {
            return JSON.stringify({ error: "Unknown action: " + p.action });
          }

          return JSON.stringify({ result });
        } catch (e) {
          console.error(e);
          return JSON.stringify({ error: "OpenProject request failed: " + e.message });
        }
      };
    </script>
  </body>
</html>
